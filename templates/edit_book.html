<!DOCTYPE html>
<html>
<head>
    <title>Edit Book</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <h3>Edit Book</h3>

    <form method="POST">
        <input type="text" name="title" class="form-control mb-2" value="{{ book[1] }}" required>
        <input type="text" name="author" class="form-control mb-2" value="{{ book[2] }}" required>
        <button class="btn btn-success">Update</button>
    </form>

    <a href="/" class="btn btn-secondary mt-2">Back</a>

</div>

</body>
</html>
