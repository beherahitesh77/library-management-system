<!DOCTYPE html>
<html>
<head>
    <title>Add Book</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
        }

        .card {
            border-radius: 15px;
        }

        .form-control {
            border-radius: 10px;
        }

        .btn-custom {
            border-radius: 10px;
            width: 100%;
        }
    </style>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center" style="height:100vh;">

    <div class="card shadow p-4" style="width: 400px;">

        <h3 class="text-center mb-3">📚 Add New Book</h3>

        <form method="POST">

            <div class="mb-3">
                <label class="form-label">Book Title</label>
                <input type="text" name="title" class="form-control" placeholder="Enter book title" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Author Name</label>
                <input type="text" name="author" class="form-control" placeholder="Enter author name" required>
            </div>

            <button type="submit" class="btn btn-primary btn-custom">Add Book</button>

        </form>

        <a href="/" class="btn btn-light mt-3">⬅ Back to Dashboard</a>

    </div>

</div>

</body>
</html>
